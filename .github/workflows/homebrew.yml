# Homebrew Tap 自动更新

name: Update Homebrew Tap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create Pull Request
        uses: homebrew/actions/create-pull-request@v5
        with:
          message: |
            Update finquant to ${{ steps.version.outputs.VERSION }}

            Created by GitHub Actions
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: meepo-quant/tap
          formula: finquant
          directory: .
